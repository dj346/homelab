labels:
  app.kubernetes.io/name: authelia
  app.kubernetes.io/instance: authelia-prod-d1
  app.kubernetes.io/managed-by: argocd

annotations: {}

rbac:
  enabled: false
  annotations: {}
  labels.app.kubernetes.io/component: rbac
  serviceAccountName: 'authelia-service-account'

service:
  type: 'ClusterIP'
  annotations: {}
  labels.app.kubernetes.io/component: networking
  port: 80
  nodePort: 30091
  clusterIP: ~
  externalTrafficPolicy: ~

pod:
  kind: 'Deployment'
  replicas: 3

  labels.app.kubernetes.io/component: program
  annotations.reloader.stakater.com/auto: "true"

  command: []
  args: []

  initContainers: []
  
  disableRestartOnChanges: false
  revisionHistoryLimit: 5
  priorityClassName: 'critical-priority'

  # autoscaling:
  #   enabled: false
  #   annotations: {}

  #   labels: {}
  #   behavior: {}

  strategy:
    type: 'RollingUpdate'
    rollingUpdate:
      partition: 0
      maxSurge: '25%'
      maxUnavailable: '25%'
  
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000

      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"

      seccompProfile.type: RuntimeDefault

    container:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000

      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true

      capabilities.drop:
        - ALL

      seccompProfile.type: RuntimeDefault

  # tolerations: []

    selectors:
      affinity:
        podAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 80
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    cnpg.io/cluster: authelia-postgresql-cluster
                topologyKey: kubernetes.io/hostname
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                      app.kubernetes.io/name: authelia
                      app.kubernetes.io/component: program
                      app.kubernetes.io/instance: authelia-prod-d1
                      app.kubernetes.io/managed-by: argocd
                topologyKey: kubernetes.io/hostname
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "node-role.kubernetes.io/control-plane"
                    operator: DoesNotExist

  env:
    - name: "TZ"
      value: "America/Los_Angeles"
  
  resources:
  
  probes:
    method.httpGet:
      path: '/api/health'
      port: 'http'
      scheme: 'HTTP'

    liveness:
      initialDelaySeconds: 0
      periodSeconds: 30
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 5

    readiness:
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 5

    startup:
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 6

  extraVolumes:
    - name: authelia-server-certificate-secret-volume
      secret:
        secretName: authelia-server-certificate-secret
  
  extraVolumeMounts:
    - name: authelia-server-certificate-secret-volume
      mountPath: /secrets/server-tls
      readOnly: true
      
  extraContainers: []

podDisruptionBudget:
  enabled: true
  
  minAvailable: 0
  maxUnavailable: 1
  
  annotations: {}
  labels.app.kubernetes.io/component: program

configMap:
  disabled: false
  default_2fa_method: '' # totp, webauthn, mobile_push
  theme: 'dark'
  
  annotations: {}
  labels:
    app.kubernetes.io/component: program
  
  existingConfigMap: ''
  extraConfigs: []
  key: 'configuration.yaml'

  server:
    port: 9091

    tls:
      certificate: /secrets/server-tls/tls.crt
      key: /secrets/server-tls/tls.key

    endpoints:
      authz:
        forward-auth:
          implementation: "ForwardAuth"
          authn_strategies:
            - name: "HeaderAuthorization"
              schemes:
                - "Bearer"
                - "Basic"
              scheme_basic_cache_lifespan: 10m
            - name: "CookieSession"
        forward-auth/basic:
          implementation: "ForwardAuth"
          authn_strategies:
            - name: "CookieSession"

  log:
    level: 'info'
    format: 'json'
    file_path: ''

  telemetry:
    metrics:
      enabled: false
      port: 9959

      serviceMonitor:
        enabled: false
        annotations: {}
        labels: 
          app.kubernetes.io/component: monitoring

  definitions:
    network:
      INTERNAL:
        - 10.15.21.0/24    # example
      

    user_attributes: {}
    # user_attributes:
      ## Boolean attribute example
      # is_admin:
        # expression: '"admin" in groups'
      ## String attribute example
      # department:
        # expression: 'groups[0]'
      ## Number attribute example
      # access_level:
        # expression: '"admin" in groups ? 10 : 5'

  identity_validation:
    reset_password:
      jwt_lifespan: '5 minutes'

      secret:
        secret_name: authelia-reset-jwt-hmac-key-secret
        path: authelia-reset-jwt-hmac-key-secret

    elevated_session:
      require_second_factor: true
      skip_second_factor: false

  totp:
    disable: false
    issuer: 'mclacken.net'
    
    skew: 1
    secret_size: 32
    period: 30

    allowed_algorithms:
    - sha1
    - sha256
    - sha512
    
    allowed_digits:
      - 6
      - 8

    allowed_periods:
      - 30

  webauthn:
    disable: false

    enable_passkey_login: true
    display_name: 'mclacken.net'
    attestation_conveyance_preference: 'direct'

    metadata:
      enabled: true
      cache_policy: relaxed
      validate_trust_anchor: true
      validate_entry: true
      validate_status: true
      validate_entry_permit_zero_aaguid: true

  ntp:
    address: 'udp://time.cloudflare.com:123'
    version: 4
    max_desync: '3 seconds'

  duo_api:
    enabled: true

    hostname: 'api-2e6db46d.duosecurity.com'
    integration_key: 'DIEDSZEQ5YSV52KRX738'

    enable_self_enrollment: true

    secret:
      secret_name: authelia-duo-api-token-secret
      path: authelia-duo-api-token-secret

  authentication_backend:
    password_reset:
      disable: false
      custom_url: ''

    password_change.disable: false

    # -- The amount of time to wait before we refresh data from the authentication backend. Uses duration notation.
    refresh_interval: '5 minutes'

    ldap:
      enabled: true
      implementation: lldap
      address: ldap://lldap-service.lldap.svc.cluster.local:3890
      timeout: 5 seconds
      base_dn: DC=mclacken,DC=net
      pooling:
        enable: false
      
      user: uid=authelia-bind-account,ou=people,dc=mclacken,dc=net
      password:
        secret_name: "authelia-lldap-bind-account-password-secret"
        path: "authelia-lldap-bind-account-password-secret"

      additional_users_dn: OU=people
      additional_groups_dn: OU=groups
      users_filter: (&(|({username_attribute}={input})({mail_attribute}={input}))(objectClass=person)(memberOf=cn=authelia-user,ou=groups,dc=mclacken,dc=net))
      groups_filter: (&(member={dn})(objectClass=groupOfNames))
      attributes:
        username: uid
        display_name: displayName
        mail: mail
      # NOTE: keep secrets out of configMap; see note below.

  password_policy.zxcvbn:
    enabled: true
    min_score: 4

  access_control:
    default_policy: 'deny'

    rules:
      - domain:
          - anisonarr.kube-prod-d1.mclacken.net
        policy:
          - one_factor
        subjects:
          - group:anisonarr-admin
    
  session:
    name: 'authelia_session'

    same_site: 'lax'
    expiration: '1 hour'
    inactivity: '5 minutes'
    remember_me: '1 month'

    encryption_key:
      secret_name: authelia-cookie-session-encryption-key-secret
      path: authelia-cookie-session-encryption-key-secret

    cookies:
      - domain: "mclacken.net"
        subdomain: "authelia.kube-prod-d1"
        name: "mclacken_authelia_session"
  
    redis:
      enabled: false
      host: 'redis-sentinel-sentinel.authelia-prod-d1.svc.cluster.local'
      port: 6379
      
      username: ''
      password:
        secret_name: ~
        path: 'session.redis.password.txt'

      database_index: 0
      maximum_active_connections: 8
      minimum_idle_connections: 0

      tls:
        enabled: true
        server_name: ''
        skip_verify: false

      high_availability:
        enabled: false

        sentinel_name: 'authelia-master'

        # username: ''

        password:
          secret_name: ~
          path: 'session.redis.sentinel.password.txt'

        nodes:
          - host: redis-sentinel-sentinel.authelia-prod-d1.svc.cluster.local
            port: 26379

        route_by_latency: false
        route_randomly: false

  regulation:
    max_retries: 3
    find_time: '2 minutes'
    ban_time: '5 minutes'

  storage:
    encryption_key:
      secret_name: authelia-storage-encryption-key-secret
      path: 'authelia-storage-encryption-key-secret'
    
    postgres:
      enabled: true

      address: tcp://authelia-postgresql-cluster-rw:5432
      servers: []

      database: 'autheliadb'
      username: 'authelia'

      password:
        secret_name: "authelia-postgresql-credentials-secret"
        path: "authelia-postgresql-credentials-secret"

      tls:
        enabled: true
        server_name: ''

  notifier:
    smtp:
      enabled: true

      address: smtp://smtp.fastmail.com:587
      timeout: '5 seconds'

      sender: authelia@mclacken.net
      username: 'dylan@mclacken.net'

      password:
        secret_name: "authelia-smtp-password-secret"
        path: "authelia-smtp-password-secret"

      tls:
        server_name: ''
        skip_verify: false

  identity_providers:
    oidc:
      enabled: true

      hmac_secret:
        secret_name: authelia-oidc-hmac-key-secret
        path: 'authelia-oidc-hmac-key-secret'

      lifespans:
        access_token: '1 hour'
        refresh_token: '1 hour and 30 minutes'
        id_token: '1 hour'
        authorize_code: '1 minute'
        device_code: '10 minutes'

        custom: {}
        # custom:
        #   lifespan_name:
        #     access_token: '1 hour'
        #     refresh_token: '1 hour and 30 minutes'
        #     id_token: '1 hour'
        #     authorize_code: '1 minute'
        #     device_code: '10 minutes'
        #     grants:
        #       authorize_code:
        #         access_token: '1 hour'
        #         refresh_token: '1 hour and 30 minutes'
        #         id_token: '1 hour'
        #       device_code:
        #         access_token: '1 hour'
        #         refresh_token: '1 hour and 30 minutes'
        #         id_token: '1 hour'
        #       implicit:
        #         access_token: '1 hour'
        #         refresh_token: '1 hour and 30 minutes'
        #         id_token: '1 hour'
        #       client_credentials:
        #         access_token: '1 hour'
        #         refresh_token: '1 hour and 30 minutes'
        #         id_token: '1 hour'
        #       refresh_token:
        #         access_token: '1 hour'
        #         refresh_token: '1 hour and 30 minutes'
        #         id_token: '1 hour'
        #       jwt_bearer:
        #         access_token: '1 hour'
        #         refresh_token: '1 hour and 30 minutes'
        #         id_token: '1 hour'

      claims_policies: {}
      # claims_policies:
      #   default:
      #     id_token:
      #       [
      #         "groups",
      #         "email",
      #         "email_verified",
      #         "alt_emails",
      #         "preferred_username",
      #         "name",
      #       ]
      #   k8s_access_claims_policy:
      #     id_token: ["preferred_username"]
      #   ei_claims_policy:
      #     id_token:
      #       [
      #         "groups",
      #         "email",
      #         "email_verified",
      #         "alt_emails",
      #         "preferred_username",
      #         "name",
      #       ]
      #     access_token:
      #       [
      #         "groups",
      #         "email",
      #         "email_verified",
      #         "alt_emails",
      #         "preferred_username",
      #         "name",
      #       ]
      #   grafana_roles:
      #     id_token: ["groups"]
      #     access_token: ["groups"]
      #     custom_claims:
      #       grafana_roles:
      #         attribute: "groups"
  
      enforce_pkce: 'public_clients_only'
      enable_pkce_plain_challenge: false

      minimum_parameter_entropy: 8

      # -- Authorization Policies configuration.
      authorization_policies: {}
          # minio-admin-2fa:
          #   default_policy: "one_factor"
          #   rules:
          #     - policy: "two_factor"
          #       subject: "group:minio-admin"
          # gitea:
          #   default_policy: "one_factor"
          #   rules:
          #     - policy: "two_factor"
          #       subject: "group:gitea-admin"
          # nextcloud:
          #   default_policy: "one_factor"
          #   rules:
          #     - policy: "two_factor"
          #       subject: "group:nextcloud-admin"
          # harbor_policy:
          #   default_policy: "deny"
          #   rules:
          #     - policy: "two_factor"
          #       subject: "group:harbor:admin"
          #     - policy: "one_factor"
          #       subject: "group:harbor:user"
          # jenkins:
          #   default_policy: "deny"
          #   rules:
          #     - policy: "two_factor"
          #       subject: "group:jenkins:admin"
          #     - policy: "one_factor"
          #       subject: "group:jenkins:developer"
          #     - policy: "one_factor"
          #       subject: "group:jenkins:user"

      jwks:
      - algorithm: "RS256"
        use: "sig"
        key:
          secret_name: "authelia-jwk-rs256-private-key-secret"
          path: "authelia-jwk-rs256-private-key-secret"

      ## Cross-Origin Resource Sharing (CORS) settings.
      cors:
        # -- List of endpoints in addition to the metadata endpoints to permit cross-origin requests on.
        endpoints: []

        # -- List of allowed origins.
        # Any origin with https is permitted unless this option is configured or the
        # allowed_origins_from_client_redirect_uris option is enabled.
        allowed_origins: []

        # -- Automatically adds the origin portion of all redirect URI's on all clients to the list of allowed_origins,
        # provided they have the scheme http or https and do not have the hostname of localhost.
        allowed_origins_from_client_redirect_uris: false

      # -- List of registered clients for this provider.
      clients: []
      # clients:
        # -
          ## The ID is the OpenID Connect ClientID which is used to link an application to a configuration.
          # client_id: 'myapp'

          ## The description to show to users when they end up on the consent screen. Defaults to the ID above.
          # client_name: 'My Application'

          ## The client secret is a shared secret between Authelia and the consumer of this client.
          # client_secret:
            # value: '$plaintext$apple123'
            # path: '/secrets/oidc.client.myapp.value'

          ## Sector Identifiers are occasionally used to generate pairwise subject identifiers. In most cases this is not
          ## necessary. Read the documentation for more information.
          ## The subject identifier must be the host component of a URL, which is a domain name with an optional port.
          # sector_identifier_uri: 'example.com'

          ## Sets the client to public. This should typically not be set, please see the documentation for usage.
          # public: false

          ## Redirect URI's specifies a list of valid case-sensitive callbacks for this client.
          # redirect_uris:
          #   - 'https://oidc.example.com/oauth2/callback'

          ## Request URI's specifies a list of valid case-sensitive URIs this client can ask Authelia to obtain a
          ## Request Object from.
          # request_uris:
          #   - 'https://oidc.example.com/oauth2/request-object/authelia.jwk'

          ## Audience this client is allowed to request.
          # audience: []

          ## Scopes this client is allowed to request.
          # scopes:
          #   - 'openid'
          #   - 'profile'
          #   - 'email'
          #   - 'groups'

          ## Grant Types configures which grants this client can obtain.
          ## It's not recommended to configure this unless you know what you're doing.
          # grant_types:
          #   - 'refresh_token'
          #   - 'authorization_code'

          ## Response Types configures which responses this client can be sent.
          ## It's not recommended to configure this unless you know what you're doing.
          # response_types:
          #   - 'code'

          ## Response Modes configures which response modes this client supports.
          ## It's not recommended to configure this unless you know what you're doing.
          # response_modes:
          #   - 'form_post'
          #   - 'query'
          #   - 'fragment'

          ## The policy to require for this client; one_factor or two_factor.
          # authorization_policy: 'two_factor'

          # lifespan: ''

          # claims_policy: ''

          # requested_audience_mode: ''

          ## The consent mode controls how consent is obtained.
          # consent_mode: 'auto'

          ## This value controls the duration a consent on this client remains remembered when the consent mode is
          ## configured as 'auto' or 'pre-configured'.
          # pre_configured_consent_duration: '30 days'

          # require_pushed_authorization_requests: false
          # require_pkce: false
          # pkce_challenge_method: 'S256'

          # authorization_signed_response_key_id: ''
          # authorization_signed_response_alg: 'RS256'
          # authorization_encrypted_response_key_id: ''
          # authorization_encrypted_response_alg: 'none'
          # authorization_encrypted_response_enc: 'A128CBC-HS256'

          # id_token_signed_response_key_id: ''
          # id_token_signed_response_alg: 'RS256'
          # id_token_encrypted_response_key_id: ''
          # id_token_encrypted_response_alg: 'none'
          # id_token_encrypted_response_enc: 'A128CBC-HS256'

          # access_token_signed_response_key_id: ''
          # access_token_signed_response_alg: 'none'
          # access_token_encrypted_response_key_id: ''
          # access_token_encrypted_response_alg: 'none'
          # access_token_encrypted_response_enc: 'A128CBC-HS256'

          # userinfo_signed_response_key_id: ''
          # userinfo_signed_response_alg: 'none'
          # userinfo_encrypted_response_key_id: ''
          # userinfo_encrypted_response_alg: 'none'
          # userinfo_encrypted_response_enc: 'A128CBC-HS256'

          # introspection_signed_response_key_id: ''
          # introspection_signed_response_alg: 'none'
          # introspection_encrypted_response_key_id: ''
          # introspection_encrypted_response_alg: 'none'
          # introspection_encrypted_response_enc: 'A128CBC-HS256'

          # request_object_signing_alg: 'RS256'
          # request_object_encryption_alg: ''
          # request_object_encryption_enc: ''

          # token_endpoint_auth_method: 'client_secret_basic'
          # token_endpoint_auth_signing_alg: 'RS256'

          # revocation_endpoint_auth_method: 'client_secret_basic'
          # revocation_endpoint_auth_signing_alg: 'RS256'

          # introspection_endpoint_auth_method: 'client_secret_basic'
          # introspection_endpoint_auth_signing_alg: 'RS256'

          # pushed_authorization_request_endpoint_auth_method: 'client_secret_basic'
          # pushed_authorization_request_endpoint_auth_signing_alg: 'RS256'

secret:
  additionalSecrets:
    authelia-reset-jwt-hmac-key-secret:
      items:
        - key: key
          path: authelia-reset-jwt-hmac-key-secret
    authelia-duo-api-token-secret:
      items:
        - key: token
          path: authelia-duo-api-token-secret
    authelia-lldap-bind-account-password-secret:
      items:
        - key: password
          path: authelia-lldap-bind-account-password-secret
    authelia-cookie-session-encryption-key-secret:
      items:
        - key: key
          path: authelia-cookie-session-encryption-key-secret
    authelia-storage-encryption-key-secret:
      items:
        - key: key
          path: authelia-storage-encryption-key-secret
    authelia-postgresql-credentials-secret:
      items:
        - key: password
          path: authelia-postgresql-credentials-secret
    authelia-smtp-password-secret:
      items:
        - key: password
          path: authelia-smtp-password-secret
    authelia-oidc-hmac-key-secret:
      items:
        - key: key
          path: authelia-oidc-hmac-key-secret


