apiVersion: apps/v1
kind: Deployment
metadata:
  name: paperless-ocr
  namespace: paperless
  labels:
    app.kubernetes.io/name: paperless
    app.kubernetes.io/component: ocr
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: paperless
      app.kubernetes.io/component: ocr
  template:
    metadata:
      labels:
        app.kubernetes.io/name: paperless
        app.kubernetes.io/component: ocr
    spec:
      containers:
        - name: gotenberg
          env:
            - name: CHROMIUM-DISABLE-JAVASCRIPT
              value: "true"
            - name: CHROMIUM_ALLOW_LIST
              value: "file:///tmp/.*"
          image: gotenberg/gotenberg:8@sha256:206a6c708fc6d05257367d9ac902d6c56c50d2e3284d0596ea000814ef97f22c
          ports:
            - name: gotenberg-http
              containerPort: 3000
              protocol: TCP
        - name: tika
          image: apache/tika:3.3.0.0-full@sha256:ecdd37e204308266b1f8e28569f8516ebd5b96d7a4518a71d3904710b20c03b3
          ports:
            - name: tika-http
              containerPort: 9998
              protocol: TCP
      restartPolicy: Always