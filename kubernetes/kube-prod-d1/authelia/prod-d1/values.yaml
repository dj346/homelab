labels: {}

annotations: {}

rbac:
  enabled: false
  annotations: {}
  labels:
    app.kubernetes.io/component: rbac
  serviceAccountName: 'authelia-service-account'

service:
  type: 'ClusterIP'
  annotations: {}
  labels:
    app.kubernetes.io/component: networking
  port: 80
  nodePort: 30091
  clusterIP: ~
  externalTrafficPolicy: ~

pod:
  kind: 'Deployment'
  replicas: 3

  labels:
    app.kubernetes.io/component: program
  annotations:
    reloader.stakater.com/auto: "true"

  command: []
  args: []

  initContainers: []
  
  disableRestartOnChanges: false
  revisionHistoryLimit: 5
  priorityClassName: 'critical-priority'

  # autoscaling:
  #   enabled: false
  #   annotations: {}

  #   labels: {}
  #   behavior: {}

  strategy:
    type: 'RollingUpdate'
    rollingUpdate:
      partition: 0
      maxSurge: '25%'
      maxUnavailable: '25%'
  
  securityContext:
    pod:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000

      fsGroup: 1000
      fsGroupChangePolicy: "OnRootMismatch"

      seccompProfile:
        type: RuntimeDefault

    container:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000

      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true

      capabilities:
        drop:
          - ALL

      seccompProfile:
        type: RuntimeDefault

  # tolerations: []

  selectors:
    affinity:
      podAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 80
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  cnpg.io/cluster: authelia-postgresql-cluster
              topologyKey: kubernetes.io/hostname
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                    app.kubernetes.io/name: authelia
                    app.kubernetes.io/component: program
                    app.kubernetes.io/instance: authelia-prod-d1
              topologyKey: kubernetes.io/hostname
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: "node-role.kubernetes.io/control-plane"
                  operator: DoesNotExist

  env:
    - name: "TZ"
      value: "America/Los_Angeles"
  
  resources:
  
  probes:
    method:
      httpGet:
        path: '/api/health'
        port: 'http'
        scheme: 'HTTP'

    liveness:
      initialDelaySeconds: 0
      periodSeconds: 30
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 5

    readiness:
      initialDelaySeconds: 0
      periodSeconds: 5
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 5

    startup:
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 6

  # extraVolumes:
  #   - name: authelia-server-certificate-secret-volume
  #     secret:
  #       secretName: authelia-server-certificate-secret
  
  # extraVolumeMounts:
  #   - name: authelia-server-certificate-secret-volume
  #     mountPath: /secrets/server-tls
  #     readOnly: true
      
  extraContainers: []

podDisruptionBudget:
  enabled: true
  
  minAvailable: 0
  maxUnavailable: 1
  
  annotations: {}
  labels:
    app.kubernetes.io/component: program

configMap:
  disabled: false
  default_2fa_method: '' # totp, webauthn, mobile_push
  theme: 'dark'
  
  annotations: {}
  labels:
    app.kubernetes.io/component: program
  
  existingConfigMap: ''
  extraConfigs: []
  key: 'configuration.yaml'

  server:
    port: 9091

    # tls:
    #   certificate: /secrets/server-tls/tls.crt
    #   key: /secrets/server-tls/tls.key

    endpoints:
      authz:
        forward-auth:
          implementation: "ForwardAuth"
          authn_strategies:
            - name: "HeaderAuthorization"
              schemes:
                - "Bearer"
                - "Basic"
              scheme_basic_cache_lifespan: 10m
            - name: "CookieSession"
        forward-auth/basic:
          implementation: "ForwardAuth"
          authn_strategies:
            - name: "CookieSession"

  log:
    level: 'info'
    format: 'json'
    file_path: ''

  telemetry:
    metrics:
      enabled: false
      port: 9959

      serviceMonitor:
        enabled: false
        annotations: {}
        labels: 
          app.kubernetes.io/component: monitoring

  definitions:
    network:
      INTERNAL:
        - 10.15.21.0/24    # example
      

    user_attributes: {}
    # user_attributes:
      ## Boolean attribute example
      # is_admin:
        # expression: '"admin" in groups'
      ## String attribute example
      # department:
        # expression: 'groups[0]'
      ## Number attribute example
      # access_level:
        # expression: '"admin" in groups ? 10 : 5'

  identity_validation:
    reset_password:
      jwt_lifespan: '5 minutes'

      secret:
        secret_name: authelia-reset-jwt-hmac-key-secret
        path: authelia-reset-jwt-hmac-key-secret

    elevated_session:
      require_second_factor: true
      skip_second_factor: false

  totp:
    disable: false
    issuer: 'mclacken.net'
    
    skew: 1
    secret_size: 32
    period: 30

    allowed_algorithms:
    - sha1
    - sha256
    - sha512
    
    allowed_digits:
      - 6
      - 8

    allowed_periods:
      - 30

  webauthn:
    disable: false

    enable_passkey_login: true
    display_name: 'mclacken.net'
    attestation_conveyance_preference: 'direct'

    metadata:
      enabled: true
      cache_policy: relaxed
      validate_trust_anchor: true
      validate_entry: true
      validate_status: true
      validate_entry_permit_zero_aaguid: true

  ntp:
    address: 'udp://time.cloudflare.com:123'
    version: 4
    max_desync: '3 seconds'

  duo_api:
    enabled: true

    hostname: 'api-2e6db46d.duosecurity.com'
    integration_key: 'DIEDSZEQ5YSV52KRX738'

    enable_self_enrollment: true

    secret:
      secret_name: authelia-duo-api-token-secret
      path: authelia-duo-api-token-secret

  authentication_backend:
    password_reset:
      disable: false
      custom_url: ''

    password_change:
      disable: false

    # -- The amount of time to wait before we refresh data from the authentication backend. Uses duration notation.
    refresh_interval: '5 minutes'

    ldap:
      enabled: true
      implementation: lldap
      address: ldap://lldap-service.lldap.svc.cluster.local:3890
      timeout: 5 seconds
      base_dn: DC=mclacken,DC=net
      pooling:
        enable: false
      
      user: uid=authelia-ro,ou=people,dc=mclacken,dc=net
      password:
        value: "6eHbP1E0YgFkKn"
        # secret_name: "authelia-lldap-bind-account-password-secret"
        # path: "authelia-lldap-bind-account-password-secret"

      additional_users_dn: OU=people
      additional_groups_dn: OU=groups
      users_filter: (&(|({username_attribute}={input})({mail_attribute}={input}))(objectClass=person)(memberOf=cn=authelia-user,ou=groups,dc=mclacken,dc=net))
      groups_filter: (&(member={dn})(objectClass=groupOfNames))
      attributes:
        username: uid
        display_name: displayName
        mail: mail
      # NOTE: keep secrets out of configMap; see note below.

  password_policy:
    zxcvbn:
      enabled: true
      min_score: 4

  access_control:
    default_policy: 'deny'

    rules:
      - domain:
          - anisonarr.kube-prod-d1.mclacken.net
        policy: one_factor
        subjects:
          - group:anisonarr-admin
      - domain:
          - proxmox.pve-prod-d1.mclacken.net
        policy: two_factor
        subjects:
          - group:proxmox-admin
    
  session:
    name: 'authelia_session'

    same_site: 'lax'
    expiration: '1 hour'
    inactivity: '5 minutes'
    remember_me: '1 month'

    encryption_key:
      secret_name: authelia-cookie-session-encryption-key-secret
      path: authelia-cookie-session-encryption-key-secret

    cookies:
      - domain: "mclacken.net"
        subdomain: "authelia.kube-prod-d1"
        name: "mclacken_authelia_session"
  
    redis:
      enabled: true

      host: 'redis-server.redis-server.svc.cluster.local'
      port: 6379

      database_index: 4
    # redis:
    #   enabled: false
    #   host: 'redis-sentinel-sentinel.authelia-prod-d1.svc.cluster.local'
    #   port: 6379
      
