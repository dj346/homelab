apiVersion: v1
kind: Pod
metadata:
  name: volume-debug
  namespace: anisonarr-prod-d1
spec:
  containers:
  - name: debug
    image: busybox@sha256:fd8d9aa63ba2f0982b5304e1ee8d3b90a210bc1ffb5314d980eb6962f1a9715d
    command: ["sh", "-c", "sleep 3600"]
    volumeMounts:
    - name: vol
      mountPath: /data
  volumes:
  - name: vol
    persistentVolumeClaim:
      claimName: test
  restartPolicy: Never
