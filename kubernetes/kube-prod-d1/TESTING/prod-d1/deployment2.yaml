apiVersion: v1
kind: Pod
metadata:
  name: volume-debug
  namespace: anisonarr-prod-d1
spec:
  containers:
  - name: debug
    image: busybox@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
    command: ["sh", "-c", "sleep 3600"]
    volumeMounts:
    - name: vol
      mountPath: /data
  volumes:
  - name: vol
    persistentVolumeClaim:
      claimName: test
  restartPolicy: Never
