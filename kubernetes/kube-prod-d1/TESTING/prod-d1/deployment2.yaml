apiVersion: v1
kind: Pod
metadata:
  name: volume-debug
  namespace: anisonarr-prod-d1
spec:
  containers:
  - name: debug
    image: busybox@sha256:32015ee641bfecc97161986c9d24957068175444f66fbcbe08a664b6cf5c1c2e
    command: ["sh", "-c", "sleep 3600"]
    volumeMounts:
    - name: vol
      mountPath: /data
  volumes:
  - name: vol
    persistentVolumeClaim:
      claimName: test
  restartPolicy: Never
